receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            # Add your app's local dev origins here
            - http://localhost:3000
            - http://localhost:5173
            - http://localhost:5174
            - http://127.0.0.1:3000
            - http://127.0.0.1:5173
            - http://127.0.0.1:5174
          allowed_headers:
            - '*'

processors:
  batch:
    timeout: 10s

connectors:
  datadog/connector:
    traces:

exporters:
  debug:
    verbosity: basic
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [datadog/connector, datadog]
    metrics:
      receivers: [datadog/connector]
      processors: [batch]
      exporters: [datadog]
