# SonarCloud configuration for automatic analysis
# See: https://docs.sonarsource.com/sonarqube-cloud/managing-your-projects/project-analysis/setting-analysis-scope/

# ── Test classification ────────────────────────────────────────────────
# Mark test files so SonarCloud applies test-specific rules (narrower
# ruleset focused on test quality) instead of production-code rules.
# Avoids false positives from production-code rules running against tests
# that intentionally exercise patterns the rules flag — e.g. S4143
# ("duplicate key set") on tests verifying update-existing-key semantics,
# or S7781 (`replaceAll`) on fixture builders.
sonar.test.inclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ── CPD (copy-paste) exclusions ────────────────────────────────────────
# Exclude intentionally duplicated files from CPD. Other analysis still
# runs on these files.
# - template-sources: CLI scaffold templates that must be self-contained copies
# - __tests__: test files with expected setup/boilerplate duplication
sonar.cpd.exclusions=packages/cli/template-sources/**,**/__tests__/**
