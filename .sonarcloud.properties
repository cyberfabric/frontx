# SonarCloud configuration for automatic analysis
# See: https://docs.sonarsource.com/sonarqube-cloud/managing-your-projects/project-analysis/setting-analysis-scope/exclude-from-coverage-duplication

# Exclude intentionally duplicated files from copy-paste detection (CPD).
# Other analysis (bugs, code smells, security) still runs on these files.
#
# - template-sources: CLI scaffold templates that must be self-contained copies
# - __tests__: test files with expected setup/boilerplate duplication
sonar.cpd.exclusions=packages/cli/template-sources/**,**/__tests__/**
